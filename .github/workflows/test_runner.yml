name: Test Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Hello World
        run: echo 'Hello World'
      - name: Check Android SDK
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "JAVA_HOME=$JAVA_HOME"
          ls $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null || echo 'No build-tools'
